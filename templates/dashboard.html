<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kimbly Applications Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #f4f6f8;
        --bg-1: #e9eef3;
        --ink: #1f2937;
        --muted: #64748b;
        --line: #d9e2ec;
        --panel: rgba(255, 255, 255, 0.88);
        --table-head: #334155;
        --success-bg: #dcfce7;
        --success-text: #166534;
        --danger-bg: #fee2e2;
        --danger-text: #991b1b;
        --warning-bg: #fef3c7;
        --warning-text: #92400e;
        --link: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(
            1000px 350px at -10% -10%,
            rgba(226, 232, 240, 0.7),
            transparent
          ),
          radial-gradient(
            900px 420px at 110% -10%,
            rgba(241, 245, 249, 0.9),
            transparent
          ),
          linear-gradient(180deg, var(--bg-0), #f8fafc 40%, #edf2f7 100%);

        color: var(--ink);
        font-family: "Manrope", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .font-heading {
        font-family: "Space Grotesk", sans-serif;
      }

      .glass {
        background: var(--panel);
        border: 1px solid rgba(203, 213, 225, 0.8);
        backdrop-filter: blur(10px);
        box-shadow:
          0 10px 30px rgba(15, 23, 42, 0.06),
          0 2px 10px rgba(15, 23, 42, 0.04);
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.78);

        border: 1px solid rgba(203, 213, 225, 0.7);

        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }

      .stat-card:hover {
        transform: translateY(-1px);

        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      }

      .badge {
        border-radius: 999px;

        padding: 5px 12px;

        font-size: 11px;

        font-weight: 700;

        letter-spacing: 0.03em;

        display: inline-flex;

        align-items: center;

        justify-content: center;
      }

      .badge-yes {
        background: var(--success-bg);
        color: var(--success-text);
      }

      .badge-no {
        background: var(--danger-bg);
        color: var(--danger-text);
      }

      .badge-online {
        background: var(--success-bg);
        color: var(--success-text);
      }

      .badge-offline {
        background: var(--danger-bg);
        color: var(--danger-text);
      }

      .badge-unknown {
        background: #e2e8f0;
        color: #475569;
      }

      .link-btn {
        color: var(--link);

        text-decoration: none;

        font-weight: 700;

        transition: opacity 0.18s ease;
      }

      .link-btn:hover {
        opacity: 0.8;
      }

      table {
        border-spacing: 0;
      }

      thead {
        background: var(--table-head);
      }

      thead th {
        color: rgba(255, 255, 255, 0.92);

        font-size: 11px;

        letter-spacing: 0.08em;

        font-weight: 700;
      }

      tbody tr {
        transition: background 0.18s ease;
      }

      tbody tr:hover {
        background: rgba(241, 245, 249, 0.7);
      }

      tbody td {
        color: #334155;
      }

      .soft-text {
        color: var(--muted);
      }

      .socket-pill {
        background: rgba(255, 255, 255, 0.85);

        border: 1px solid rgba(203, 213, 225, 0.8);

        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-up {
        animation: fadeUp 360ms ease-out;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #edf2f7;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 999px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
  </head>

  <body>
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="glass rounded-3xl p-5 sm:p-7 animate-fade-up">
        <div
          class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between"
        >
          <div>
            <h1 class="mt-1 font-heading text-3xl font-bold">
              Kimbly Labs Dashboard
            </h1>
          </div>

          <div
            class="socket-pill flex items-center gap-2 rounded-full px-4 py-2"
          >
            <span
              id="socket-dot"
              class="h-2.5 w-2.5 rounded-full bg-amber-400"
            ></span>

            <span
              id="socket-status"
              class="text-xs font-semibold text-slate-700"
            >
              Connecting
            </span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4 sm:grid-cols-4">
          <div class="stat-card rounded-2xl px-4 py-4">
            <p class="text-[11px] uppercase tracking-wide soft-text">
              Total Apps
            </p>

            <p id="stat-total" class="mt-2 font-heading text-2xl font-bold">
              0
            </p>
          </div>

          <div class="stat-card rounded-2xl px-4 py-4">
            <p class="text-[11px] uppercase tracking-wide soft-text">Online</p>

            <p
              id="stat-online"
              class="mt-2 font-heading text-2xl font-bold text-emerald-600"
            >
              0
            </p>
          </div>

          <div class="stat-card rounded-2xl px-4 py-4">
            <p class="text-[11px] uppercase tracking-wide soft-text">Offline</p>

            <p
              id="stat-offline"
              class="mt-2 font-heading text-2xl font-bold text-rose-600"
            >
              0
            </p>
          </div>

          <div class="stat-card rounded-2xl px-4 py-4">
            <p class="text-[11px] uppercase tracking-wide soft-text">
              Last Update
            </p>

            <p
              id="stat-updated"
              class="mt-2 text-sm font-semibold text-slate-700"
            >
              -
            </p>
          </div>
        </div>
      </section>

      <section class="glass mt-6 overflow-hidden rounded-3xl animate-fade-up">
        <div class="overflow-x-auto">
          <table class="min-w-full border-collapse">
            <thead>
              <tr class="text-left">
                <th class="px-5 py-4">Application Name</th>
                <th class="px-5 py-4">Daily Login</th>
                <th class="px-5 py-4">DB Reset</th>
                <th class="px-5 py-4">Redirect Link</th>
                <th class="px-5 py-4">Insert Mode</th>
                <th class="px-5 py-4">Low Priority Logs</th>
                <th class="px-5 py-4">Online</th>
              </tr>
            </thead>

            <tbody
              id="table-body"
              class="divide-y divide-slate-200 bg-white/75"
            ></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script src="/static/js/dashboard.js" defer></script>
  </body>
</html>
