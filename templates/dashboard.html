<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kimbly Applications Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&family=Space+Grotesk:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #f3f9f7;
        --bg-1: #d8ece6;
        --ink: #162129;
        --muted: #52616d;
        --line: #d6e4e0;
        --panel: rgba(255, 255, 255, 0.9);
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(1100px 380px at -8% -14%, var(--bg-1), transparent),
          radial-gradient(900px 450px at 108% -12%, #eef7f4, transparent),
          linear-gradient(180deg, var(--bg-0), #f8fcfb 42%, #ecf6f2 100%);
        color: var(--ink);
        font-family: "Manrope", sans-serif;
      }

      .font-heading {
        font-family: "Space Grotesk", sans-serif;
      }

      .glass {
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(8px);
        box-shadow: 0 20px 46px -24px rgba(10, 31, 37, 0.25);
      }

      .badge {
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .badge-yes {
        background: #dcfce7;
        color: #166534;
      }

      .badge-no {
        background: #fee2e2;
        color: #991b1b;
      }

      .badge-online {
        background: #dcfce7;
        color: #166534;
      }

      .badge-offline {
        background: #fee2e2;
        color: #991b1b;
      }

      .link-btn {
        color: #0f766e;
        text-decoration: underline;
        text-decoration-color: #99f6e4;
        text-underline-offset: 3px;
        font-weight: 700;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-up {
        animation: fadeUp 360ms ease-out;
      }
    </style>
  </head>
  <body>
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
      <section class="glass rounded-2xl p-5 sm:p-7 animate-fade-up">
        <div
          class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between"
        >
          <div>
            <h1 class="mt-1 font-heading text-2xl font-bold sm:text-3xl">
              Kimbly Labs Dashboard
            </h1>
            
          </div>
          <div
            class="flex items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-1.5"
          >
            <span
              id="socket-dot"
              class="h-2.5 w-2.5 rounded-full bg-amber-400"
            ></span>
            <span
              id="socket-status"
              class="text-xs font-semibold text-slate-700"
              >Connecting</span
            >
          </div>
        </div>

        <div class="mt-5 grid grid-cols-2 gap-3 sm:grid-cols-4">
          <div class="rounded-xl border border-slate-200 bg-white/90 px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Total Apps
            </p>
            <p id="stat-total" class="mt-1 font-heading text-lg font-semibold">
              0
            </p>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white/90 px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Online
            </p>
            <p
              id="stat-online"
              class="mt-1 font-heading text-lg font-semibold text-emerald-600"
            >
              0
            </p>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white/90 px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Offline
            </p>
            <p
              id="stat-offline"
              class="mt-1 font-heading text-lg font-semibold text-rose-600"
            >
              0
            </p>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white/90 px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Last Update
            </p>
            <p
              id="stat-updated"
              class="mt-1 text-sm font-semibold text-slate-700"
            >
              -
            </p>
          </div>
        </div>
      </section>

      <section class="glass mt-6 overflow-hidden rounded-2xl animate-fade-up">
        <div class="overflow-x-auto">
          <table class="min-w-full border-collapse">
            <thead class="bg-slate-900 text-white">
              <tr class="text-left text-xs uppercase tracking-[0.12em]">
                <th class="px-4 py-3 font-semibold">Application Name</th>
                <th class="px-4 py-3 font-semibold">Daily Login</th>
                <th class="px-4 py-3 font-semibold">DB Reset</th>
                <th class="px-4 py-3 font-semibold">Redirect Link</th>
                <th class="px-4 py-3 font-semibold">Insert Mode</th>
                <th class="px-4 py-3 font-semibold">Low Priority Logs</th>
                <th class="px-4 py-3 font-semibold">Online</th>
              </tr>
            </thead>
            <tbody
              id="table-body"
              class="divide-y divide-slate-200 bg-white/90"
            ></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/dashboard.js" defer></script>
  </body>
</html>
