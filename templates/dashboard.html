<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kimbly Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-0: #f4f8fb;
        --bg-1: #dde8f5;
        --ink: #0f172a;
        --muted: #475569;
        --line: #dbe7f3;
        --panel: rgba(255, 255, 255, 0.88);
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(1200px 400px at -10% -20%, var(--bg-1), transparent),
          radial-gradient(900px 420px at 110% -10%, #eaf2fb, transparent),
          linear-gradient(180deg, var(--bg-0), #f8fbff 45%, #eef5fb 100%);
        color: var(--ink);
      }

      .glass {
        background: var(--panel);
        backdrop-filter: blur(8px);
        border: 1px solid var(--line);
      }

      .modal-panel {
        background: #ffffff;
        border: 1px solid #d8e4f0;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
      }

      .label {
        color: var(--muted);
      }

      .grow {
        animation-delay: var(--delay, 0ms);
      }

      .font-heading {
        font-family: "Sora", sans-serif;
      }

      .shadow-panel {
        box-shadow: 0 18px 40px -22px rgba(2, 6, 23, 0.32);
      }

      @keyframes liftIn {
        0% {
          opacity: 0;
          transform: translateY(12px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-liftIn {
        animation: liftIn 420ms ease forwards;
      }

      .metric {
        border: 1px solid #dce7f3;
        background: #ffffffcc;
      }

      .metric-value {
        font-family: "Sora", sans-serif;
        font-weight: 600;
      }
    </style>
  </head>
  <body class="font-body">
    <div class="mx-auto max-w-7xl px-4 pb-14 pt-8 sm:px-6 lg:px-8">
      <header class="glass rounded-2xl p-5 shadow-panel sm:p-7">
        <div
          class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between"
        >
          <div>
            <p
              class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500"
            >
              Kimbly Labs
            </p>
            <h1 class="mt-1 font-heading text-2xl font-semibold sm:text-3xl">
              Application Dashboard
            </h1>
            <p id="summary" class="mt-2 text-sm text-slate-600">
              Waiting for first realtime update...
            </p>
          </div>
          <div
            class="flex items-center gap-2 self-start rounded-full border border-slate-300 bg-white/90 px-3 py-1.5"
          >
            <span id="socket-dot" class="dot bg-amber-400"></span>
            <span
              id="socket-status"
              class="text-xs font-semibold text-slate-700"
              >Connecting</span
            >
          </div>
        </div>

        <div class="mt-5 grid grid-cols-2 gap-3 lg:grid-cols-5">
          <div class="metric rounded-xl px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Live
            </p>
            <p
              id="stat-live"
              class="metric-value mt-1 text-lg text-emerald-600"
            >
              0
            </p>
          </div>
          <div class="metric rounded-xl px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Warning
            </p>
            <p
              id="stat-warning"
              class="metric-value mt-1 text-lg text-amber-600"
            >
              0
            </p>
          </div>
          <div class="metric rounded-xl px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Offline
            </p>
            <p
              id="stat-offline"
              class="metric-value mt-1 text-lg text-rose-600"
            >
              0
            </p>
          </div>
          <div class="metric rounded-xl px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Last Update
            </p>
            <p
              id="stat-updated"
              class="metric-value mt-1 text-sm text-slate-700"
            >
              -
            </p>
          </div>
          <div class="metric rounded-xl px-3 py-2">
            <p class="text-[11px] uppercase tracking-wide text-slate-500">
              Market (IST)
            </p>
            <p
              id="stat-market"
              class="metric-value mt-1 text-sm text-slate-700"
            >
              CLOSED
            </p>
          </div>
        </div>
      </header>

      <section class="mt-7">
        <div
          id="cards"
          class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3"
        ></div>
      </section>

      <div
        id="details-modal"
        class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/55 px-4"
      >
        <div class="modal-panel w-full max-w-3xl rounded-2xl shadow-panel">
          <div
            class="flex items-start justify-between gap-3 border-b border-slate-200 px-5 py-4 sm:px-6"
          >
            <div>
              <p class="text-xs uppercase tracking-[0.14em] text-slate-500">
                App Details
              </p>
              <h3
                id="details-title"
                class="mt-1 font-heading text-xl font-semibold"
              ></h3>
            </div>
            <button
              id="details-close"
              class="rounded-lg border border-slate-300 px-2.5 py-1 text-sm font-medium text-slate-700"
              type="button"
            >
              Close
            </button>
          </div>
          <div class="max-h-[72vh] overflow-y-auto px-5 py-4 sm:px-6">
            <div class="grid grid-cols-1 gap-3 text-sm sm:grid-cols-2">
              <p>
                <span class="label">Status:</span>
                <span id="details-status"></span>
              </p>
              <p>
                <span class="label">Daily Login:</span>
                <span id="details-login"></span>
              </p>
              <p>
                <span class="label">DB Reset:</span>
                <span id="details-reset"></span>
              </p>
              <p>
                <span class="label">Insert Mode:</span>
                <span id="details-insert"></span>
              </p>
              <p>
                <span class="label">Low Logs:</span>
                <span id="details-low-logs"></span>
              </p>
              <p>
                <span class="label">Priority Alerts:</span>
                <span id="details-warnings"></span>
              </p>
              <p>
                <span class="label">Last Activity:</span>
                <span id="details-last-activity"></span>
              </p>
              <p>
                <span class="label">Last Refresh:</span>
                <span id="details-refreshed"></span>
              </p>
              <p class="sm:col-span-2">
                <span class="label">App URL:</span>
                <a
                  id="details-url"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="text-sky-700 underline"
                ></a>
              </p>
              <p class="sm:col-span-2 text-rose-600" id="details-error"></p>
            </div>

            <details
              class="mt-4 rounded-xl border border-slate-200 bg-slate-50/80 p-3"
            >
              <summary
                class="cursor-pointer text-sm font-semibold text-slate-700"
              >
                Raw payload
              </summary>
              <pre
                id="details-json"
                class="mt-3 max-h-56 overflow-auto rounded-lg border border-slate-200 bg-white p-3 text-xs text-slate-700"
              ></pre>
            </details>
          </div>
        </div>
      </div>

      <template id="card-template">
        <article
          class="glass grow rounded-2xl p-5 opacity-0 shadow-panel animate-liftIn"
        >
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="card-app-name font-heading text-lg font-semibold"></h2>
              <p class="card-last-activity mt-1 text-xs text-slate-500"></p>
            </div>
            <span
              class="card-status rounded-full px-2.5 py-1 text-xs font-semibold"
            ></span>
          </div>

          <dl class="mt-4 grid grid-cols-2 gap-x-3 gap-y-3 text-sm">
            <div>
              <dt class="label text-xs">Daily Login</dt>
              <dd class="card-login mt-0.5 font-medium"></dd>
            </div>
            <div>
              <dt class="label text-xs">DB Reset</dt>
              <dd class="card-reset mt-0.5 font-medium"></dd>
            </div>
            <div>
              <dt class="label text-xs">Insert Mode</dt>
              <dd class="card-insert mt-0.5 font-medium"></dd>
            </div>
            <div>
              <dt class="label text-xs">Low Logs</dt>
              <dd class="card-low-logs mt-0.5 font-medium"></dd>
            </div>
          </dl>

          <div
            class="mt-4 flex items-center justify-between border-t border-slate-200 pt-3"
          >
            <p class="card-error text-xs text-rose-600"></p>
            <a
              class="card-open text-sm font-semibold text-sky-700 underline decoration-sky-300 underline-offset-4"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              Open App
            </a>
          </div>
        </article>
      </template>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/js/dashboard.js" defer></script>
  </body>
</html>
